spring:
  application:
    name: ${SPRING_APPLICATION_NAME:tickets}
server:
  port: ${SERVER_PORT:8080}
  address: ${SERVER_ADDRESS:0.0.0.0}

  # Database connections
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/event-ticket-platform}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}

  jpa:
    hibernate:
      ddl-auto: ${JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${JPA_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:9090/realms/event-ticket-platform}
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:http://localhost:9090/realms/event-ticket-platform/protocol/openid-connect/certs}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:45a5ab274a27e5d346d087ae3ddee57b2c2aab25cabb03adb39f21c42a8ab37c}
      expiration: ${JWT_EXPIRATION:86400000} # 24 hours