spring:
  application:
    name: tickets

  # Database connections
  datasource:
    url: jdbc:postgresql://localhost:5432/event-ticket-platform
    username: postgres
    password: Avond778@
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/event-ticket-platform
          jwk-set-uri: http://localhost:9090/realms/event-ticket-platform/protocol/openid-connect/certs