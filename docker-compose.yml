services:
  postgres:
    container_name: postgres-sql-etp
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Avond778@
      PGDATA: /var/lib/postgresql/data
      POSTGRES_DB: event-ticket-platform
    volumes:
      - postgres:/data/postgres
    ports:
      - 5432:5432
    networks:
      - spring-demo
    restart: unless-stopped

#  mail-dev:
#    container_name: mail-dev-shs
#    image: maildev/maildev
#    ports:
#      - 1080:1080
#      - 1025:1025
#    networks:
#      - spring-demo

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    ports:
      - "9090:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - keycloak-data:/opt/keycloak/data
    networks:
      - spring-demo
    command:
      - start-dev
      - --db=dev-file

networks:
  spring-demo:
    driver: bridge

volumes:
  postgres:
    driver: local
  keycloak-data:
    driver: local